name: Build pi4j-kotlin

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - name: build project
        run: ./gradlew build
      - name: Run tests
        run: ./gradlew lib:check lib-serial:check
